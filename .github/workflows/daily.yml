name: daily-refresh
on:
  schedule:
    - cron: "20 13 * * *"   # 每天UTC 13:20 ≈ 美西早上6:20
  workflow_dispatch: {}      # 手动触发按钮
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python run.py
      - name: commit history + dashboard
        run: |
          git config user.name monitor-bot
          git config user.email bot@users.noreply.github.com
          git add data/history data/auto dashboard.html
          git commit -m "daily refresh $(date -u +%F)" || echo "no changes"
          git push
